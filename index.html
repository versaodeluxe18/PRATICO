      <style>
          html, body { height: 100%; }
          .canvas-area { min-height: 100vh; background-color: #ffffff; cursor: default; }
          .canvas-area.panning { cursor: grabbing; }
          .checkerboard {
              background-image:
                  linear-gradient(45deg, #d9dadc 25%, transparent 25%),
                  linear-gradient(-45deg, #d9dadc 25%, transparent 25%),
                  linear-gradient(45deg, transparent 75%, #d9dadc 75%),
                  linear-gradient(-45deg, transparent 75%, #d9dadc 75%);
              background-size: 24px 24px;
              background-position: 0 0, 0 12px, 12px -12px, -12px 0;

          #stage { background-color: transparent; touch-action: none; }
          .image-container { position: absolute; max-width: none; user-select: none; cursor: move; touch-action: none; }
          .image-container.selected { outline: 2px solid #000; outline-offset: 2px; }
          .image-container img { display: block; width: 100%; height: 100%; }
          .resize-handle {
              position: absolute;
              width: 12px;
              height: 12px;
              background-color: #000;
              border: 2px solid #fff;
              box-sizing: border-box;
              opacity: 0;
              transition: opacity 0.2s;

          .image-container.selected .resize-handle {
              opacity: 1;
          }
          .resize-handle.tl { top: -6px; left: -6px; cursor: nw-resize; }
          .resize-handle.tr { top: -6px; right: -6px; cursor: ne-resize; }
          .resize-handle.bl { bottom: -6px; left: -6px; cursor: sw-resize; }
          .resize-handle.br { bottom: -6px; right: -6px; cursor: se-resize; }
          .tool-label { font-size: 11px; font-weight: 600; }
          
          /* Toolbar styles */
          #toolbar-drag-handle { cursor: grab; user-select: none; }
          #toolbar-drag-handle.dragging { cursor: grabbing; }
          
          /* Dropdown menu styles */
          .toolbar-dropdown {
              position: absolute;
              bottom: 100%;
              background: #f8f9fb;
              border: 1px solid #c6c6cd;
              border-radius: 8px;

          /* Icon button styles */

      <script>
          const workspace = document.getElementById('workspace');
          const toolbar = document.getElementById('floating-toolbar');
          const stage = document.getElementById('stage');
          const stageWrapper = document.getElementById('stage-wrapper');
          const stageInfo = document.getElementById('stage-info');
          const imageInput = document.getElementById('image-input');
          const importImageBtn = document.getElementById('import-image-btn');
          const quickImportButton = document.getElementById('quick-import');
          const stageSizeBtn = document.getElementById('stage-size-btn');
          const stageSizeDropdown = document.getElementById('stage-size-dropdown');
          const zoomControl = document.getElementById('zoom-control');
          const savePngButton = document.getElementById('save-png');
          const dragHandle = document.getElementById('toolbar-drag-handle');
          
          // New elements
          const shapesBtn = document.getElementById('shapes-btn');
          const shapesMenu = document.getElementById('shapes-menu');
          const colorBtn = document.getElementById('color-btn');
          const colorPicker = document.getElementById('color-picker');
          const colorInput = document.getElementById('color-input');
          const colorPreview = document.getElementById('color-preview');
          const eyedropperBtn = document.getElementById('eyedropper-btn');

          const state = { 
              stageWidth: 1080, 
              stageHeight: 1080, 
              zoom: 0.5, 
              stageOffsetX: 0, 
              stageOffsetY: 0, 
              selectedImage: null,
              currentTool: null,
              currentColor: '#000000',
              isDrawing: false,
              drawingCanvas: null
          };

          function updateStageTransform() {
              stageWrapper.style.transform = `translate(${state.stageOffsetX}px, ${state.stageOffsetY}px) scale(${state.zoom})`;
          }

          function updateStageInfo() {
              stageInfo.textContent = `Palco: ${state.stageWidth} × ${state.stageHeight} px · Zoom: ${Math.round(state.zoom * 100)}%`;
          }

          function setStageSize(width, height) {
              state.stageWidth = width;
              state.stageHeight = height;
              stage.style.width = `${width}px`;
              stage.style.height = `${height}px`;
              updateStageInfo();
          }

          function setZoom(percent) {
              state.zoom = Number(percent) / 100;
              updateStageTransform();
              updateStageInfo();
          }

          function selectImage(container) {
              document.querySelectorAll('.image-container.selected').forEach((item) => item.classList.remove('selected'));
              state.selectedImage = container;
              if (container) container.classList.add('selected');
          }

          function createResizeHandles(container) {
              const corners = ['tl', 'tr', 'bl', 'br'];
              corners.forEach(corner => {
                  const handle = document.createElement('div');
                  handle.className = `resize-handle ${corner}`;
                  handle.dataset.corner = corner;
                  container.appendChild(handle);
              });
          }

          function addMovableImage(src) {
              const container = document.createElement('div');
              container.className = 'image-container';
              
              const image = new Image();
              image.draggable = false;
              image.onload = () => {
                  const maxWidth = state.stageWidth * 0.6;
                  const maxHeight = state.stageHeight * 0.6;
                  const scale = Math.min(1, maxWidth / image.naturalWidth, maxHeight / image.naturalHeight);
                  container.dataset.width = Math.round(image.naturalWidth * scale);
                  container.dataset.height = Math.round(image.naturalHeight * scale);
                  container.dataset.aspectRatio = image.naturalWidth / image.naturalHeight;
                  container.style.width = `${container.dataset.width}px`;
                  container.style.height = `${container.dataset.height}px`;
                  container.dataset.x = Math.round((state.stageWidth - Number(container.dataset.width)) / 2);
                  container.dataset.y = Math.round((state.stageHeight - Number(container.dataset.height)) / 2);
                  container.style.left = `${container.dataset.x}px`;
                  container.style.top = `${container.dataset.y}px`;
                  createResizeHandles(container);
                  selectImage(container);
              };
              image.src = src;
              container.appendChild(image);
              container.addEventListener('pointerdown', startImageDrag);
              stage.appendChild(container);
          }

          function startImageDrag(event) {
              if (event.button !== 0) return;
              
              const container = event.currentTarget;
              const handle = event.target.closest('.resize-handle');
              
              if (handle) {
                  startImageResize(event, container, handle);
                  return;
              }
              
              event.preventDefault();
              selectImage(container);
              container.setPointerCapture(event.pointerId);
              const startX = event.clientX;
              const startY = event.clientY;
              const initialX = Number(container.dataset.x || 0);
              const initialY = Number(container.dataset.y || 0);

              function moveImage(moveEvent) {
                  const nextX = initialX + (moveEvent.clientX - startX) / state.zoom;
                  const nextY = initialY + (moveEvent.clientY - startY) / state.zoom;
                  container.dataset.x = Math.round(nextX);
                  container.dataset.y = Math.round(nextY);
                  container.style.left = `${container.dataset.x}px`;
                  container.style.top = `${container.dataset.y}px`;
              }

              function stopImageDrag() {
                  container.removeEventListener('pointermove', moveImage);
                  container.removeEventListener('pointerup', stopImageDrag);
                  container.removeEventListener('pointercancel', stopImageDrag);
              }

              container.addEventListener('pointermove', moveImage);
              container.addEventListener('pointerup', stopImageDrag);
              container.addEventListener('pointercancel', stopImageDrag);
          }

          function startImageResize(event, container, handle) {
              event.preventDefault();
              event.stopPropagation();
              container.setPointerCapture(event.pointerId);
              
              const corner = handle.dataset.corner;
              const startX = event.clientX;
              const startY = event.clientY;
              const initialWidth = Number(container.dataset.width);
              const initialHeight = Number(container.dataset.height);
              const initialX = Number(container.dataset.x);
              const initialY = Number(container.dataset.y);
              const aspectRatio = Number(container.dataset.aspectRatio);

              function resizeImage(resizeEvent) {
                  const deltaX = (resizeEvent.clientX - startX) / state.zoom;
                  const deltaY = (resizeEvent.clientY - startY) / state.zoom;
                  const maintainAspect = resizeEvent.shiftKey;

                  let newWidth = initialWidth;
                  let newHeight = initialHeight;
                  let newX = initialX;
                  let newY = initialY;

                  if (corner.includes('r')) {
                      newWidth = Math.max(50, initialWidth + deltaX);
                  } else if (corner.includes('l')) {
                      newWidth = Math.max(50, initialWidth - deltaX);
                      newX = initialX + (initialWidth - newWidth);
                  }

                  if (corner.includes('b')) {
                      newHeight = Math.max(50, initialHeight + deltaY);
                  } else if (corner.includes('t')) {
                      newHeight = Math.max(50, initialHeight - deltaY);
                      newY = initialY + (initialHeight - newHeight);
                  }

                  if (maintainAspect) {
                      if (Math.abs(deltaX) > Math.abs(deltaY)) {
                          newHeight = Math.round(newWidth / aspectRatio);
                      } else {
                          newWidth = Math.round(newHeight * aspectRatio);
                      }

                      if (corner.includes('t')) {
                          newY = initialY + (initialHeight - newHeight);
                      }
                      if (corner.includes('l')) {
                          newX = initialX + (initialWidth - newWidth);
                      }
                  }

                  container.dataset.width = Math.round(newWidth);
                  container.dataset.height = Math.round(newHeight);
                  container.dataset.x = Math.round(newX);
                  container.dataset.y = Math.round(newY);
                  
                  container.style.width = `${container.dataset.width}px`;
                  container.style.height = `${container.dataset.height}px`;
                  container.style.left = `${container.dataset.x}px`;
                  container.style.top = `${container.dataset.y}px`;
              }

              function stopImageResize() {
                  container.removeEventListener('pointermove', resizeImage);
                  container.removeEventListener('pointerup', stopImageResize);
                  container.removeEventListener('pointercancel', stopImageResize);
              }

              container.addEventListener('pointermove', resizeImage);
              container.addEventListener('pointerup', stopImageResize);
              container.addEventListener('pointercancel', stopImageResize);
          }

          // Drawing functionality
          function createDrawingCanvas() {
              if (state.drawingCanvas) {
                  state.drawingCanvas.remove();
              }
              
              const canvas = document.createElement('canvas');
              canvas.width = state.stageWidth;
              canvas.height = state.stageHeight;
              canvas.style.position = 'absolute';
              canvas.style.top = '0';
              canvas.style.left = '0';
              canvas.style.cursor = 'crosshair';
              canvas.style.zIndex = '5';
              
              stage.appendChild(canvas);
              state.drawingCanvas = canvas;
              return canvas;
          }

          function startDrawing(event) {
              if (!state.currentTool || state.currentTool === 'none') return;
              
              const canvas = state.drawingCanvas || createDrawingCanvas();
              const rect = stage.getBoundingClientRect();
              const scaleX = canvas.width / stage.offsetWidth;
              const scaleY = canvas.height / stage.offsetHeight;
              
              const startX = (event.clientX - rect.left) * scaleX;
              const startY = (event.clientY - rect.top) * scaleY;
              
              const ctx = canvas.getContext('2d');
              ctx.strokeStyle = state.currentColor;
              ctx.lineWidth = 2;
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';
              ctx.fillStyle = state.currentColor;
              
              state.isDrawing = true;
              
              if (state.currentTool === 'pencil') {
                  ctx.beginPath();
                  ctx.moveTo(startX, startY);
              }
              
              function draw(moveEvent) {
                  if (!state.isDrawing) return;
                  
                  const currentX = (moveEvent.clientX - rect.left) * scaleX;
                  const currentY = (moveEvent.clientY - rect.top) * scaleY;
                  
                  if (state.currentTool === 'pencil') {
                      ctx.lineTo(currentX, currentY);
                      ctx.stroke();
                  }
              }
              
              function stopDrawing() {
                  state.isDrawing = false;
                  
                  if (state.currentTool === 'circle') {
                      const endX = (event.clientX - rect.left) * scaleX;
                      const endY = (event.clientY - rect.top) * scaleY;
                      const radius = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                      ctx.beginPath();
                      ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                      ctx.stroke();
                  } else if (state.currentTool === 'rectangle') {
                      const endX = (event.clientX - rect.left) * scaleX;
                      const endY = (event.clientY - rect.top) * scaleY;
                      const width = endX - startX;
                      const height = endY - startY;
                      ctx.strokeRect(startX, startY, width, height);
                  } else if (state.currentTool === 'square') {
                      const endX = (event.clientX - rect.left) * scaleX;
                      const endY = (event.clientY - rect.top) * scaleY;
                      const side = Math.max(Math.abs(endX - startX), Math.abs(endY - startY));
                      ctx.strokeRect(startX, startY, side, side);
                  }
                  
                  canvas.removeEventListener('pointermove', draw);
                  canvas.removeEventListener('pointerup', stopDrawing);
                  canvas.removeEventListener('pointercancel', stopDrawing);
              }
              
              canvas.addEventListener('pointermove', draw);
              canvas.addEventListener('pointerup', stopDrawing);
              canvas.addEventListener('pointercancel', stopDrawing);
          }

          function activateTool(tool) {
              state.currentTool = state.currentTool === tool ? null : tool;
              
              if (state.currentTool) {
                  stage.classList.add('drawing');
                  if (!state.drawingCanvas) createDrawingCanvas();
                  stage.addEventListener('pointerdown', startDrawing);
              } else {
                  stage.classList.remove('drawing');
                  stage.removeEventListener('pointerdown', startDrawing);
              }
              
              document.querySelectorAll('.shape-menu-item').forEach(item => {
                  item.style.backgroundColor = item.dataset.shape === state.currentTool ? '#dce2f3' : 'transparent';
              });
          }

          function activateEyedropper() {
              state.currentTool = state.currentTool === 'eyedropper' ? null : 'eyedropper';
              
              if (state.currentTool === 'eyedropper') {
                  stage.classList.add('eyedropper');
                  stage.addEventListener('click', pickColor, true);
              } else {
                  stage.classList.remove('eyedropper');
                  stage.removeEventListener('click', pickColor, true);
              }
              
              eyedropperBtn.style.backgroundColor = state.currentTool === 'eyedropper' ? '#dce2f3' : 'transparent';
          }

          function pickColor(event) {
              if (!state.drawingCanvas) return;
              
              event.preventDefault();
              event.stopPropagation();
              
              const canvas = state.drawingCanvas;
              const rect = stage.getBoundingClientRect();
              const scaleX = canvas.width / stage.offsetWidth;
              const scaleY = canvas.height / stage.offsetHeight;
              
              const x = Math.floor((event.clientX - rect.left) * scaleX);
              const y = Math.floor((event.clientY - rect.top) * scaleY);
              
              const ctx = canvas.getContext('2d');
              const imageData = ctx.getImageData(x, y, 1, 1);
              const data = imageData.data;
              
              const hex = '#' + [data[0], data[1], data[2]].map(x => {
                  const hex = x.toString(16);
                  return hex.length === 1 ? '0' + hex : hex;
              }).join('').toUpperCase();
              
              state.currentColor = hex;
              colorInput.value = hex;
              colorPreview.style.backgroundColor = hex;
              
              activateEyedropper();
          }

          function openImporter() { imageInput.click(); }

          imageInput.addEventListener('change', (event) => {
              const file = event.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = () => addMovableImage(reader.result);
              reader.readAsDataURL(file);
              imageInput.value = '';
          });

          // Stage size dropdown
          stageSizeBtn.addEventListener('click', () => {
              stageSizeDropdown.classList.toggle('show');
              stageSizeBtn.classList.toggle('active');
              shapesMenu.classList.remove('show');
              shapesBtn.classList.remove('active');
              colorPicker.classList.remove('show');
              colorBtn.classList.remove('active');
          });

          document.addEventListener('click', (event) => {
              if (!toolbar.contains(event.target)) {
                  stageSizeDropdown.classList.remove('show');
                  stageSizeBtn.classList.remove('active');
                  shapesMenu.classList.remove('show');
                  shapesBtn.classList.remove('active');
                  colorPicker.classList.remove('show');
                  colorBtn.classList.remove('active');
              }
          });

          document.querySelectorAll('.toolbar-dropdown-item').forEach(item => {
              item.addEventListener('click', (event) => {
                  const size = event.target.dataset.size;
                  if (size === 'custom') {
                      const width = Number(prompt('Largura do palco em pixels:', state.stageWidth));
                      const height = Number(prompt('Altura do palco em pixels:', state.stageHeight));
                      if (width > 0 && height > 0) setStageSize(Math.round(width), Math.round(height));
                  } else {
                      const [width, height] = size.split('x').map(Number);
                      setStageSize(width, height);
                  }
                  stageSizeDropdown.classList.remove('show');
                  stageSizeBtn.classList.remove('active');
              });
          });

          // Shapes menu
          shapesBtn.addEventListener('click', () => {
              shapesMenu.classList.toggle('show');
              shapesBtn.classList.toggle('active');
              stageSizeDropdown.classList.remove('show');
              stageSizeBtn.classList.remove('active');
              colorPicker.classList.remove('show');
              colorBtn.classList.remove('active');
          });

          document.querySelectorAll('.shape-menu-item').forEach(item => {
              item.addEventListener('click', (event) => {
                  const tool = event.currentTarget.dataset.shape;
                  activateTool(tool);
              });
          });

          // Color picker
          colorBtn.addEventListener('click', () => {
              colorPicker.classList.toggle('show');
              colorBtn.classList.toggle('active');
              stageSizeDropdown.classList.remove('show');
              stageSizeBtn.classList.remove('active');
              shapesMenu.classList.remove('show');
              shapesBtn.classList.remove('active');
          });

          colorInput.addEventListener('change', (event) => {
              state.currentColor = event.target.value;
              colorPreview.style.backgroundColor = state.currentColor;
          });

          eyedropperBtn.addEventListener('click', (event) => {
              event.preventDefault();
              activateEyedropper();
              colorPicker.classList.remove('show');
              colorBtn.classList.remove('active');
          });

          zoomControl.addEventListener('input', (event) => setZoom(event.target.value));
          importImageBtn.addEventListener('click', openImporter);
          quickImportButton.addEventListener('click', openImporter);

          savePngButton.addEventListener('click', () => {
              const canvas = document.createElement('canvas');
              canvas.width = state.stageWidth;
              canvas.height = state.stageHeight;
              const context = canvas.getContext('2d');
              
              // Draw white background
              context.fillStyle = '#ffffff';
              context.fillRect(0, 0, canvas.width, canvas.height);
              
              // Draw drawing canvas
              if (state.drawingCanvas) {
                  context.drawImage(state.drawingCanvas, 0, 0);
              }
              
              // Draw images
              [...stage.querySelectorAll('.image-container')].forEach((container) => {
                  const image = container.querySelector('img');
                  context.drawImage(
                      image,
                      Number(container.dataset.x || 0),
                      Number(container.dataset.y || 0),
                      Number(container.dataset.width || image.naturalWidth),
                      Number(container.dataset.height || image.naturalHeight)
                  );
              });
              
              const link = document.createElement('a');
              link.download = `palco-${state.stageWidth}x${state.stageHeight}.png`;
              link.href = canvas.toDataURL('image/png');
              link.click();
          });

          stage.addEventListener('pointerdown', (event) => {
              if (event.target === stage && event.button === 0 && !state.currentTool) selectImage(null);
          });

          workspace.addEventListener('contextmenu', (event) => event.preventDefault());

          workspace.addEventListener('pointerdown', (event) => {
              if (event.button !== 2) return;
              event.preventDefault();
              workspace.classList.add('panning');
              workspace.setPointerCapture(event.pointerId);
              const startX = event.clientX;
              const startY = event.clientY;
              const initialOffsetX = state.stageOffsetX;
              const initialOffsetY = state.stageOffsetY;

              function panStage(moveEvent) {
                  state.stageOffsetX = initialOffsetX + moveEvent.clientX - startX;
                  state.stageOffsetY = initialOffsetY + moveEvent.clientY - startY;
                  updateStageTransform();
              }

              function stopPanning() {
                  workspace.classList.remove('panning');
                  workspace.removeEventListener('pointermove', panStage);
                  workspace.removeEventListener('pointerup', stopPanning);
                  workspace.removeEventListener('pointercancel', stopPanning);
              }

              workspace.addEventListener('pointermove', panStage);
              workspace.addEventListener('pointerup', stopPanning);
              workspace.addEventListener('pointercancel', stopPanning);
          });

          // Toolbar drag
          let isDraggingToolbar = false;
          let offsetX, offsetY;
          dragHandle.addEventListener('pointerdown', (event) => {
              isDraggingToolbar = true;
              dragHandle.classList.add('dragging');
              offsetX = event.clientX - toolbar.getBoundingClientRect().left;
              offsetY = event.clientY - toolbar.getBoundingClientRect().top;
              toolbar.style.transition = 'none';
              dragHandle.setPointerCapture(event.pointerId);
          });

          document.addEventListener('pointermove', (event) => {
              if (!isDraggingToolbar) return;
              toolbar.style.left = `${event.clientX - offsetX}px`;
              toolbar.style.top = `${event.clientY - offsetY}px`;
              toolbar.style.bottom = 'auto';
              toolbar.style.transform = 'none';
          });

          document.addEventListener('pointerup', () => {
              isDraggingToolbar = false;
              dragHandle.classList.remove('dragging');
          });

          updateStageTransform();
          updateStageInfo();
          
          // Initialize color preview
          colorPreview.style.backgroundColor = state.currentColor;
      </script>
  </body></html>
